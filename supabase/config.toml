
[functions.run-job]
enabled = true
verify_jwt = false
import_map = "./functions/run-job/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/run-job/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/run-job/*.html" ]

[functions.get-job-logs]
enabled = true
verify_jwt = false
import_map = "./functions/get-job-logs/deno.json"
entrypoint = "./functions/get-job-logs/index.ts"

[functions.chat]
enabled = true
verify_jwt = false
import_map = "./functions/chat/deno.json"
entrypoint = "./functions/chat/index.ts"
